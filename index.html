<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>molly ennis</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <main>
    <nav class="nav">
      <button class="nav-btn active" data-section="about" data-text="[-] about">
about
      </button>
      <button class="nav-btn" data-section="work-work" data-text="[+] work work">
work work
      </button>
      <!-- <button class="nav-btn" data-section="independent-work" data-text="[+] independent work">
independent work
      </button> -->
      <button class="nav-btn" data-section="information" data-text="[+] information">
information
      </button>
    </nav>

    <div class="content-area">
      <div class="content-panel active" data-panel="about">
        <p>molly ennis is a designer in new york</p>
      </div>

      <div class="content-panel" data-panel="work-work">
        <p>getting it together, please come back later</p>
      </div>

      <div class="content-panel" data-panel="independent-work">
        <div class="work-slides" id="indie-slides">
          <div class="work-slide active" data-slide="0">
            <div class="work-placeholder"></div>
            <h3>project one</h3>
            <p>placeholder for independent work.</p>
          </div>
          <div class="work-slide" data-slide="1">
            <div class="work-placeholder"></div>
            <h3>project two</h3>
            <p>placeholder for independent work.</p>
          </div>
        </div>
        <div class="work-nav">
          <span class="work-counter"><span id="indie-current">01</span> &rarr;</span>
        </div>
      </div>

      <div class="content-panel" data-panel="information">
        <div class="contact-list">
          <button class="contact-item" data-index="0" id="copy-email" style="position: relative;"><span class="contact-text">01 email</span> <svg class="contact-arrow" width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M16 4H20V20H4V16H0V0H16V4ZM12 12V4H4V12H12Z" fill="currentColor"/></svg><span class="copied-msg" hidden>copied ollymennis@gmail.com</span></button>
          <a href="https://github.com/ollymennis" target="_blank" rel="noopener" class="contact-item" data-index="1"><span class="contact-text">02 github</span> <svg class="contact-arrow" width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M6 18H2V14H6V18ZM10 14H6V10H10V14ZM18 14H14V10H10V6H6V2H18V14Z" fill="currentColor"/></svg></a>
          <a href="#" class="contact-item" data-index="2"><span class="contact-text">03 cv</span> <svg class="contact-arrow" width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M6 18H2V14H6V18ZM10 14H6V10H10V14ZM18 14H14V10H10V6H6V2H18V14Z" fill="currentColor"/></svg></a>
          <button class="contact-item" data-index="3" id="open-canvas"><span class="contact-text">04 draw something</span> <svg class="contact-arrow" width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M6 18H2V14H6V18ZM10 14H6V10H10V14ZM18 14H14V10H10V6H6V2H18V14Z" fill="currentColor"/></svg></button>
        </div>
      </div>

      <!-- Drawing modal -->
      <div class="canvas-modal" id="canvas-modal" hidden>
        <div class="canvas-modal-inner">
          <div class="canvas-header">
            <span>draw something</span>
            <button class="canvas-close" id="canvas-close">&times;</button>
          </div>
          <canvas id="draw-canvas" width="500" height="500"></canvas>
          <div class="canvas-footer">
            <button class="canvas-btn" id="canvas-clear">clear</button>
            <button class="canvas-btn canvas-btn-primary" id="canvas-send">send</button>
          </div>
        </div>
      </div>
    </div>
  </main>

  <img class="sticker" src="/stickers/dahlia.png" alt="" style="max-width: 20px; max-height: 20px;" draggable="false" />
  <img class="sticker" src="/stickers/trux.png" alt="" draggable="false" />

  <img class="sticker" src="/stickers/baca-pup.png" alt="" style="max-width: 70px; max-height: 70px;" draggable="false" />
  <img class="sticker" src="/stickers/yarn.png" alt="" draggable="false" />
  <img class="sticker" src="/stickers/goggles.png" alt="" draggable="false" />
  <img class="sticker" src="/stickers/v70.svg" alt="" style="max-width: 65px; max-height: 65px;" draggable="false" />

  <script type="module" src="/main.js"></script>
</body>
</html>
