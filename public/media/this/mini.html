<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  @font-face {
    font-family: 'JetBrains Mono';
    src: url('/fonts/JetBrainsMono/JetBrainsMono-Regular.woff2') format('woff2');
    font-weight: 400;
  }
  @font-face {
    font-family: 'JetBrains Mono';
    src: url('/fonts/JetBrainsMono/JetBrainsMono-Bold.woff2') format('woff2');
    font-weight: 700;
  }
  @font-face {
    font-family: 'JetBrains Mono';
    src: url('/fonts/JetBrainsMono/JetBrainsMono-Italic.woff2') format('woff2');
    font-weight: 400; font-style: italic;
  }

  :root {
    --bg: #FFF8F0;
    --fg: #032620;
    --fg-muted: #4a6b64;
    --border: #d4d3d0;
    --mono: 'JetBrains Mono', 'SF Mono', 'Fira Code', monospace;
  }

  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; cursor: inherit; }
  html { overflow: hidden; background: var(--bg); width: 100%; height: 100%; font-size: 5px; cursor: url('/icons/mouse.svg'), auto; }
  body {
    overflow: hidden; background: var(--bg); width: 100%; height: 100%;
    font-family: var(--mono); color: var(--fg); font-size: 5px;
    -webkit-font-smoothing: antialiased;
    user-select: none; -webkit-user-select: none;
    cursor: url('/icons/mouse.svg'), auto;
  }

  main { padding: 2.2rem; }
  .nav { display: flex; flex-direction: column; gap: 0.4rem; }
  .nav-btn {
    display: block; width: fit-content; background: none; border: none;
    font-family: var(--mono); font-size: 1rem; font-weight: 400;
    color: var(--fg); cursor: url('/icons/mouse-hover.svg'), pointer; text-align: left;
    padding: 0.1rem 0; position: relative; outline: none;
    transition: background 80ms, color 80ms, padding-left 120ms 60ms;
  }
  .nav-btn:active { cursor: url('/icons/mouse-click.svg'), pointer !important; }
  .nav-btn.active {
    background: var(--fg); color: var(--bg);
    padding-left: 0.5rem; padding-right: 0.15rem;
  }
  .nav-btn:hover:not(.active)::after {
    content: ''; position: absolute; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg width='3' height='3' xmlns='http://www.w3.org/2000/svg'%3E%3Crect width='1' height='1' fill='%23032620'/%3E%3C/svg%3E");
    background-size: 2px 2px; pointer-events: none;
  }

  .content-area { margin-top: 1.3rem; margin-left: 1.2rem; font-size: 1rem; line-height: 1.5; }
  .content-panel { display: none; }
  .content-panel.active { display: block; }

  .bio-quote { max-width: 200px; }
  .bio-quotemark { display: block; font-size: 1.4rem; line-height: 1; margin-bottom: 0.05rem; }
  .bio-text { font-style: italic; font-weight: 700; }
  .bio-attribution { margin-top: 0.3rem; }
  .intro-text { margin-top: 0.6rem; max-width: 200px; color: var(--fg); font-size: 0.8rem; line-height: 1.5; }

  .work-layout { display: flex; gap: 1rem; }
  .contact-list { display: flex; flex-direction: column; gap: 0.4rem; flex-shrink: 0; }
  .project-item {
    font-family: var(--mono); font-size: inherit; color: var(--fg);
    background: none; border: none; cursor: url('/icons/mouse-hover.svg'), pointer; padding: 0; text-align: left;
    outline: none; opacity: 0; transform: translateY(6px);
  }
  .project-item:active { cursor: url('/icons/mouse-click.svg'), pointer !important; }
  .project-item.in { animation: item-enter 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
  @keyframes item-enter { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
  .project-item:hover { text-decoration: underline; text-underline-offset: 1px; }
  .project-item.highlighted { font-weight: 700; text-decoration: none; }
  .project-item.highlighted .project-title { margin-left: 0.3rem; }
  .project-title { transition: margin-left 120ms ease; }

  .project-display {
    display: none; position: fixed;
    top: 0; left: clamp(60px, 30%, 100px); right: 0; bottom: 0;
    padding: 2.2rem 0 0 1rem; background: var(--bg); z-index: 150;
  }
  .project-display.active { display: block; animation: panel-in 200ms cubic-bezier(0.16, 1, 0.3, 1) both; }
  @keyframes panel-in { from { opacity: 0; } to { opacity: 1; } }
  .project-display h2 {
    font-size: 1rem; font-weight: 400; margin-bottom: 0.2rem;
    opacity: 0; animation: header-in 250ms cubic-bezier(0.16, 1, 0.3, 1) 40ms both;
  }
  .project-display p {
    font-size: 0.75rem; color: var(--fg-muted); font-style: italic;
    opacity: 0; animation: header-in 250ms cubic-bezier(0.16, 1, 0.3, 1) 80ms both;
  }
  .intro-text { margin-top: 0.4rem; max-width: 120px; color: var(--fg); font-size: 0.7rem; line-height: 1.4; font-style: normal !important; }
  .project-display .placeholder { margin-top: 0.6rem; max-width: 120px; display: flex; flex-direction: column; gap: 0.3rem; }
  .placeholder-line { height: 0.4rem; background: var(--border); border-radius: 0; opacity: 0.4; }
  @media (max-width: 300px) {
    .project-display .placeholder { max-width: 80px; }
    .placeholder-line { height: 0.3rem; }
  }
  @keyframes header-in { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
  .mirror-wrap { position: relative; margin-top: 0.5rem; }
  .mirror-frame {
    position: absolute; border: 1px solid var(--border); border-radius: 3px;
    opacity: 0; display: flex;
    animation: mirror-in 0.4s cubic-bezier(0.16, 1, 0.3, 1) both;
  }
  .mirror-nav {
    display: flex; flex-direction: column; gap: 1px; padding: 3px;
    flex-shrink: 0; opacity: 0;
    animation: mirror-in 0.3s cubic-bezier(0.16, 1, 0.3, 1) both;
  }
  .mirror-nav-line {
    height: 1px; background: var(--border); opacity: 0.6;
  }
  .mirror-panel {
    position: relative; flex: 1;
  }
  @keyframes mirror-in { from { opacity: 0; } to { opacity: 0.5; } }
  @media (max-width: 200px) {
    .mirror-wrap { display: none; }
  }

  .sticker {
    position: fixed; max-width: 16px; max-height: 16px;
    width: auto; height: auto; z-index: 100; user-select: none;
    cursor: url('/icons/mouse-hover.svg'), grab; visibility: hidden;
    transition: transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.4s ease;
  }
  .sticker.sticker-out { transform: scale(0) !important; opacity: 0; pointer-events: none; }
</style>
</head>
<body>
<main>
  <nav class="nav">
    <button class="nav-btn active" data-section="about">about</button>
    <button class="nav-btn" data-section="work-work">work work</button>
    <button class="nav-btn" data-section="information">information</button>
  </nav>
  <div class="content-area">
    <div class="content-panel active" data-panel="about">
      <blockquote class="bio-quote">
        <span class="bio-quotemark">&ldquo;</span>
        <p class="bio-text">molly ennis is the strongest generalist of our time. so strong, in fact, that people have occasionally mistaken her for a specialist.</p>
        <p class="bio-attribution">&mdash; someone else who is not molly ennis</p>
      </blockquote>
    </div>
    <div class="content-panel" data-panel="work-work">
      <div class="work-layout">
        <div class="contact-list">
          <button class="project-item" data-index="0" data-title="moneybot" data-sub="giving an AI financial assistant a face"><span class="project-num">01</span> <span class="project-title">moneybot</span></button>
          <button class="project-item" data-index="1" data-title="icons-mcp" data-sub="an icon server for AI agents"><span class="project-num">02</span> <span class="project-title">icons-mcp</span></button>
          <button class="project-item" data-index="2" data-title="svg maker" data-sub="generating production SVGs with AI"><span class="project-num">03</span> <span class="project-title">svg maker</span></button>
          <button class="project-item" data-index="3" data-title="asset cabinet" data-sub="semantic search for icon libraries"><span class="project-num">04</span> <span class="project-title">asset cabinet</span></button>
          <button class="project-item" data-index="4" data-title="quarto" data-sub="an embedding visualizer"><span class="project-num">05</span> <span class="project-title">quarto</span></button>
          <button class="project-item" data-index="5" data-title="1,000 things" data-sub="an icon system at scale"><span class="project-num">06</span> <span class="project-title">1,000 things</span></button>
          <button class="project-item" data-index="6" data-title="loading" data-sub="motion design explorations"><span class="project-num">07</span> <span class="project-title">loading</span></button>
          <button class="project-item" data-index="7" data-title="hands" data-sub="coming soon"><span class="project-num">08</span> <span class="project-title">hands</span></button>
          <button class="project-item" data-index="8" data-title="this" data-sub="how this website works"><span class="project-num">09</span> <span class="project-title">this</span></button>
        </div>
        <div class="project-display" id="project-display"></div>
      </div>
    </div>
    <div class="content-panel" data-panel="information">
      <div class="contact-list">
        <span class="project-item in" style="opacity:1;transform:none">01 resume</span>
        <span class="project-item in" style="opacity:1;transform:none">02 github</span>
        <span class="project-item in" style="opacity:1;transform:none">03 email</span>
      </div>
    </div>
  </div>
</main>

<img class="sticker" src="/stickers/baca-pup.png" alt="" style="max-width:18px;max-height:18px" draggable="false" />
<img class="sticker" src="/stickers/yarn.png" alt="" draggable="false" />
<img class="sticker" src="/stickers/yuzu.png" alt="" style="max-width:10px;max-height:10px" draggable="false" />

<script>
const navBtns = document.querySelectorAll('.nav-btn');
const panels = document.querySelectorAll('.content-panel');
const projectDisplay = document.getElementById('project-display');
let currentSection = 'about';
let currentProject = -1;
const stickers = document.querySelectorAll('.sticker');

navBtns.forEach(btn => {
  btn.addEventListener('click', () => {
    const section = btn.dataset.section;
    if (section === currentSection) return;
    navBtns.forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    panels.forEach(p => p.classList.remove('active'));
    document.querySelector(`[data-panel="${section}"]`).classList.add('active');
    currentSection = section;
    projectDisplay.classList.remove('active');
    projectDisplay.innerHTML = '';
    currentProject = -1;
    items.forEach(it => it.classList.remove('highlighted'));
    if (section === 'work-work') {
      const its = document.querySelectorAll('[data-panel="work-work"] .project-item');
      its.forEach((it, i) => { it.classList.remove('in'); setTimeout(() => it.classList.add('in'), i * 30); });
    }
    stickers.forEach(s => {
      if (section === 'work-work') s.classList.add('sticker-out');
      else s.classList.remove('sticker-out');
    });
  });
});

const items = document.querySelectorAll('[data-panel="work-work"] .project-item');
items.forEach(item => {
  item.addEventListener('click', () => {
    const idx = parseInt(item.dataset.index);
    if (currentProject === idx) {
      projectDisplay.classList.remove('active');
      projectDisplay.innerHTML = '';
      currentProject = -1;
      items.forEach(it => it.classList.remove('highlighted'));
      return;
    }
    currentProject = idx;
    items.forEach(it => it.classList.remove('highlighted'));
    item.classList.add('highlighted');
    const title = item.dataset.title;
    const sub = item.dataset.sub;
    let contentHTML;
    const lines = [85, 60, 72, 90, 45];
    let ph;
    if (idx === 8) {
      ph = '<div class="placeholder" style="margin-top:0.5rem">';
      [100, 100, 95, 55].forEach((w, i) => {
        ph += `<div class="placeholder-line" style="width:${w}%;animation:header-in 250ms cubic-bezier(0.16,1,0.3,1) ${120+i*40}ms both"></div>`;
      });
      ph += '</div>';
      // Single ghost frame with side panel
      const navLines = Array.from({length: 5}, () =>
        `<div class="mirror-nav-line" style="width:${8 + Math.random() * 10}px"></div>`
      ).join('');
      const mirror = `<div class="mirror-wrap" style="width:min(120px,100%);aspect-ratio:3/2">` +
        `<div class="mirror-frame" style="position:relative;width:100%;height:100%;animation-delay:400ms">` +
        `<div class="mirror-nav" style="animation-delay:700ms">${navLines}</div>` +
        `<div class="mirror-panel"></div>` +
        `</div></div>`;
      contentHTML = `<h2>${title}</h2><p>${sub}</p>${ph}${mirror}`;
    } else {
      ph = '<div class="placeholder">';
      for (let i = 0; i < 4; i++) ph += `<div class="placeholder-line" style="width:${lines[i]}%;animation:header-in 250ms cubic-bezier(0.16,1,0.3,1) ${120+i*40}ms both"></div>`;
      ph += '</div>';
      contentHTML = `<h2>${title}</h2><p>${sub}</p>${ph}`;
    }
    projectDisplay.innerHTML = contentHTML;
    projectDisplay.classList.remove('active');
    void projectDisplay.offsetWidth;
    projectDisplay.classList.add('active');
  });
});

let stickerZ = 100;
stickers.forEach(sticker => {
  const vw = window.innerWidth, vh = window.innerHeight;
  let x, y;
  do { x = Math.random() * (vw - 20); y = Math.random() * (vh - 20); } while (x < vw * 0.4 && y < vh * 0.5);
  sticker.style.left = x + 'px';
  sticker.style.top = y + 'px';
  sticker.style.visibility = 'visible';
  let dragging = false, ox = 0, oy = 0;
  function start(cx, cy) { dragging = true; stickerZ++; sticker.style.zIndex = stickerZ; ox = cx - sticker.getBoundingClientRect().left; oy = cy - sticker.getBoundingClientRect().top; sticker.style.cursor = "url('/icons/mouse-click.svg'), grabbing"; }
  function move(cx, cy) { if (!dragging) return; sticker.style.left = (cx - ox) + 'px'; sticker.style.top = (cy - oy) + 'px'; }
  function end() { if (!dragging) return; dragging = false; sticker.style.cursor = "url('/icons/mouse-hover.svg'), grab"; }
  sticker.addEventListener('mousedown', e => { e.preventDefault(); start(e.clientX, e.clientY); });
  document.addEventListener('mousemove', e => move(e.clientX, e.clientY));
  document.addEventListener('mouseup', end);
  sticker.addEventListener('touchstart', e => { e.preventDefault(); start(e.touches[0].clientX, e.touches[0].clientY); }, { passive: false });
  document.addEventListener('touchmove', e => { if (dragging) { e.preventDefault(); move(e.touches[0].clientX, e.touches[0].clientY); } }, { passive: false });
  document.addEventListener('touchend', end);
});

// ─── LOAD INTRO FROM MARKDOWN ────────────────────────────
let introText = '';
fetch('/projects/09-this.md').then(r => r.text()).then(md => {
  for (const line of md.split('\n')) {
    const t = line.trim();
    if (!t || t.startsWith('#') || t.startsWith('_') || t.startsWith('<')) continue;
    introText = t;
    break;
  }
});
</script>
</body>
</html>
